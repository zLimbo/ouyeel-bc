<div layout:decorator="base">

    <div layout:fragment="menu">
    </div>

    <div layout:fragment="content">
        <div class="container-fluid  dashboard-content">

            <div class="card">
                <h5 class="card-header">已上链交易信息</h5>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped table-bordered first">
                            <thead>
                            <tr>
                                <th>txHash</th>
                                <th>blockAddTime</th>
                                <th>blockNumber</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="onChainTx: ${onChainTxList}">
                                <td th:each="value: ${onChainTx}" th:text="${value}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
